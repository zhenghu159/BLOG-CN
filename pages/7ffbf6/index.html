Cite: Oh, S., Harris, J., Ng, L. et al. A mesoscale connectome of the mouse brain. Nature 508, 207–214 (2014).</p> <div class="custom-block note"><p class="custom-block-title">相关阅读</p> <p>微信公众号：<a href="https://mp.weixin.qq.com/s?__biz=MzkwMjM0MzA5MA==&amp;mid=2247483737&amp;idx=1&amp;sn=ba941e2b01ddabf66a0575ca3d82ad19&amp;chksm=c0a7b184f7d0389257c023b3ac544fd7881d2021d28d8d7b914c70603c9cae6f8a261188e1ad&amp;token=549238884&amp;lang=zh_CN#rd" target="_blank" rel="noopener noreferrer">文献阅读：小鼠大脑的中尺度连接组<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Hongkui Zeng(曾红葵)</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://alleninstitute.org/wp-content/uploads/2022/12/Hongkui_Zeng_SQUARE.jpg" height="200"></td></tr> <tr><td style="text-align:center;">Allen Institute for Brain Science</td></tr> <tr><td style="text-align:center;"><a href="mailto:hongkuiz@alleninstitute.org">hongkuiz@alleninstitute.org</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract:</h2> <p>对大脑接线图的全面了解是理解神经系统如何在局部和全局范围内处理信息的基础。然而，除了秀丽隐杆线虫的微尺度连接组外，在其他物种中还没有完整的连接数据集。在这里，我们报告了一个小鼠全脑范围的、细胞水平的、中尺度连接组。Allen 小鼠大脑连接图谱使用增强绿色荧光蛋白（EGFP）表达腺相关病毒载体追踪特定区域和细胞类型的轴突投射，以及高通量系列双光子断层扫描对整个大脑的 EGFP 标记的轴突进行成像。这种系统和标准化的方法允许将单个实验的空间配准到一个共同的三维（3D）参考空间中，从而产生一个全脑连接矩阵。一个计算模型可以深入了解连接强度分布、对称性和其他网络特性。虚拟束状图显示了相互连接的区域之间的三维拓扑。皮层-丘脑通路分析显示了平行通路的分离和整合。 Allen Mouse Brain Connectivity Atlas 是一个免费获得的基础资源，用于对支持健康和疾病中的行为和认知过程的神经环路进行结构和功能研究。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results:</h2> <h3 id="figure-1-creation-of-the-connectivity-atlas"><a href="#figure-1-creation-of-the-connectivity-atlas" class="header-anchor">#</a> Figure 1. Creation of the Connectivity Atlas</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig1_HTML.jpg?as=webp" alt="Figure 1"></p> <div class="custom-block note"><p class="custom-block-title">Figure 1. 连接图谱的创建</p> <p><strong>a.</strong> 数据的生成和处理流程。AAV-EGFP 顺行示踪剂被用来标记轴突投射。使用 TissueCyte 1000 系列双光子 (STP) 断层扫描系统对 EGFP 标记的轴突投射进行系统成像。一共做了 1,231 个脑子，每个脑子以 100um 间隔连续切片，一共获得了 140 个切片。 <br> <strong>b.</strong> 图像经过信息学方法处理注册到 Allen Reference Atlas 中，并从背景中分割荧光信号。 <br> <strong>c.</strong> 注射部位在大脑中的分布，球的大小表示注射体积。柱状图显示了主要脑区的平均注射量。</p></div> <h3 id="figure-2-whole-brain-projection-patterns-from-seven-representative-cortical-regions"><a href="#figure-2-whole-brain-projection-patterns-from-seven-representative-cortical-regions" class="header-anchor">#</a> Figure 2. Whole brain projection patterns from seven representative cortical regions</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig2_HTML.jpg?as=webp" alt="Figure 2"></p> <div class="custom-block note"><p class="custom-block-title">Figure 2. 来自 7 个具有代表性的皮层区域的全脑投射模式</p> <p>第一行显示了注射位点的冠状切片。 <br>
第二行显示了不同注射位点投射的 3D 矢状视图。 <br>
下面 6 行显示了代表性皮层下区域中 EGFP 标记的轴突示例。</p></div> <h3 id="figure-3-adult-mouse-brain-connectivity-matrix"><a href="#figure-3-adult-mouse-brain-connectivity-matrix" class="header-anchor">#</a> Figure 3. Adult mouse brain connectivity matrix</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig3_HTML.jpg?as=webp" alt="Figure 3"></p> <div class="custom-block note"><p class="custom-block-title">Figure 3. 成年小鼠脑连接矩阵</p> <p>每行显示从 469 个注射大脑中到右（同侧）和左（对侧）半脑的 295 个非重叠目标区域（列）中的定量投射信号。</p></div> <h3 id="figure-4-a-computational-model-of-inter-regional-connection-strengths"><a href="#figure-4-a-computational-model-of-inter-regional-connection-strengths" class="header-anchor">#</a> Figure 4. A computational model of inter-regional connection strengths</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig4_HTML.jpg?as=webp" alt="Figure 4"></p> <div class="custom-block note"><p class="custom-block-title">Figure 4. 一个区域间连接强度的计算模型</p> <p><strong>a.</strong> 区域间连接矩阵。 <br> <strong>b.</strong> 全脑和皮层-皮层连接都可以通过单分量对数正态分布（红线）进行拟合。然而，全脑连接强度的对数分布最适合双分量高斯混合模型（绿线）。 <br> <strong>c.</strong> 与具有匹配图统计的 Erdos-Renyi、Watts-Strogatz 和 Barabasi-Albert 网络相比，线性模型网络的二值化版本的节点度和聚类系数分布。 <br> <strong>d.</strong> 区域之间归一化连接密度相关系数的比较，定义为投射到其他区域的共同来源（左）和其他区域投射的共同目标（右）。</p></div> <h3 id="figure-5-topography-of-cortico-striatal-and-cortico-thalamic-projections"><a href="#figure-5-topography-of-cortico-striatal-and-cortico-thalamic-projections" class="header-anchor">#</a> Figure 5. Topography of cortico-striatal and cortico-thalamic projections</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig5_HTML.jpg?as=webp" alt="Figure 5"></p> <div class="custom-block note"><p class="custom-block-title">Figure 5. 皮层-纹状体和皮层-丘脑投射的拓扑图</p> <p><strong>a.</strong> 皮层平面图中的皮层域。每个圆圈代表 80 个皮层注射实验中的一个，其位置是通过 3D 的多维缩放获得的，以允许在一个 2D 平面中可视化所有位点。圆圈的大小与注射量成正比。 <br> <strong>b.</strong> 对于共同可视化，来自 a 的 21 个选定注射的体素密度在同侧半球的 8 个冠状水平上叠加为点阵图。对于点阵图，为每个体素中的每次注射绘制一个圆圈，其大小与投影强度成正比；圆圈被排序，最大的在后面，最小的在前面，并且部分偏移为螺旋形。 <br> <strong>c.</strong> b 中白框勾勒出的区域的点阵图放大视图。 <br> <strong>d.</strong> 两个皮层半球的 3D 纤维束成像路径。 <br> <strong>e.</strong> 进入同侧尾壳核的 3D 纤维束成像路径的内侧视图。体素起点表示为实心圆，注射部位终点表示为空心圆。 <br> <strong>f.</strong> 进入同侧丘脑的 3D 纤维束成像路径的俯视图。</p></div> <h3 id="figure-6-a-wiring-diagram-of-connections-between-major-cortical-regions-and-thalamic-nuclei"><a href="#figure-6-a-wiring-diagram-of-connections-between-major-cortical-regions-and-thalamic-nuclei" class="header-anchor">#</a> Figure 6. A wiring diagram of connections between major cortical regions and thalamic nuclei</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fnature13186/MediaObjects/41586_2014_Article_BFnature13186_Fig6_HTML.jpg?as=webp" alt="Figure 6"></p> <div class="custom-block note"><p class="custom-block-title">Figure 6. 主要皮层区域与丘脑核之间的连接线路图</p> <p>上图和下图分别显示了从皮层到丘脑或从丘脑到皮层的投射（仅同侧投射）。不同皮层区域及其相应丘脑核的颜色编码类似于 Fig. 5a 中的平面图皮层。箭头的粗细表示投射强度，如 Extended Data Fig. 10 中所示，以三个级别显示，大致对应于原始连接矩阵中的红色、橙色和黄色（Fig. 3）。LGv 和 PF 对皮层没有明显的投射。丘脑 (RT) 的网状核（虚线框）位于皮层和丘脑之间，以说明其作为中继核的特殊作用，所有皮层-丘脑和丘脑-皮层投射都通过并投射到其中。星号表示味觉/内脏通路中的皮层-丘脑和丘脑-皮层投射位于 GU/VISC 皮层区域和 VPMpc/VPLpc 核（而不是 VPM/VPL）之间。</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%A5%9E%E7%BB%8F%E7%94%9F%E7%89%A9%E5%AD%A6" title="标签">#神经生物学</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2024/02/19, 20:54:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/9e1c62/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Bridging the Gap between Connectome and Transcriptome</div></a> <a href="/pages/dc1352/" class="page-nav-centre page-nav-centre-next"><div cl
