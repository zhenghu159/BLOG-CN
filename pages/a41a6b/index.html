DOI: <a href="https://doi.org/10.1093/bioinformatics/btu393" target="_blank" rel="noopener noreferrer">https://doi.org/10.1093/bioinformatics/btu393<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="circlize-介绍"><a href="#circlize-介绍" class="header-anchor">#</a> circlize 介绍</h2> <div align="center"><img src="https://camo.githubusercontent.com/621d2c628b5a35fe44fed69319ad3efc13d0ea3718a005c51162410329bc2b70/68747470733a2f2f6a6f6b6572676f6f2e6769746875622e696f2f636972636c697a655f626f6f6b2f626f6f6b2f696d616765732f636972636c697a655f636f7665722e6a7067" width="300"></div> <p>圆形布局是大量信息可视化的有效方式。这里，circlize 包提供了 R 中圆形布局生成的实现以及可用软件的增强。该软件包的灵活性基于低级图形函数的使用，使得用户可以根据特定目的轻松实现自定义的高级图形。结合 R 中强大的计算和视觉环境之间的无缝连接，circlize 为用户提供了更多便利和自由来设计图形，以更好地理解多维数据背后的复杂模式。</p> <h2 id="examples"><a href="#examples" class="header-anchor">#</a> Examples</h2> <p>See <a href="https://jokergoo.github.io/circlize_examples/" target="_blank" rel="noopener noreferrer">https://jokergoo.github.io/circlize_examples/<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>.
<img src="https://camo.githubusercontent.com/2f7c23ad2c5940953019d3c4961f9c3f97f266ea2ae03e67ffcc717dd7abc203/68747470733a2f2f6a6f6b6572676f6f2e6769746875622e696f2f636972636c697a655f626f6f6b2f626f6f6b2f696d616765732f6369636c697a655f6578616d706c65732e6a7067" alt=""></p> <h2 id="install"><a href="#install" class="header-anchor">#</a> Install</h2> <p>The package can be installed from CRAN:</p> <div class="language-r line-numbers-mode"><pre class="language-r"><code>install.packages<span class="token punctuation">(</span><span class="token string">&quot;circlize&quot;</span><span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="book"><a href="#book" class="header-anchor">#</a> book</h2> <h3 id="about"><a href="#about" class="header-anchor">#</a> About</h3> <p>官方教程：<a href="https://jokergoo.github.io/circlize_book/book/index.html" target="_blank" rel="noopener noreferrer">https://jokergoo.github.io/circlize_book/book/index.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <br>
